<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Guess Archive - Interactive Game</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YYGK3MHH26"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YYGK3MHH26');
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #fff; background-image: radial-gradient(circle at 50% 0%, #1e1b4b, #0f172a); min-height: 100vh; }
  .font-display { font-family: 'Oswald', sans-serif; }
  .glass-panel { background: rgba(30,41,59,.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.1); }
  .gold-gradient-text { background: linear-gradient(to bottom,#fde68a,#d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .btn-primary { background: linear-gradient(135deg,#3b82f6,#2563eb); transition: all .2s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,.5); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  .fade-in { animation: fadeIn .5s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .timer-bar { height:4px; background:linear-gradient(90deg,#22c55e,#eab308,#ef4444); width:100%; transform-origin:left; }
  .clue-stack-enter { animation: slideIn .4s cubic-bezier(.16,1,.3,1); }
  @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>
<body class="flex flex-col">

<!-- Navigation -->
<nav class="glass-panel sticky top-0 z-50 border-b border-white/10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-3 cursor-pointer" onclick="app.setView('home')">
        <img src="bestguessarchive.png" alt="Best Guess Archive Logo" class="h-10 w-10 rounded-full border-2 border-yellow-500 object-cover">
        <span class="font-display text-xl tracking-wider text-white">BEST GUESS <span class="text-yellow-500">ARCHIVE</span></span>
      </div>
      <div class="hidden md:flex items-center space-x-1">
        <button class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition" onclick="app.setView('home')">Home</button>
        <button class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition" onclick="app.startRandomGame()">Play</button>
        <button class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition" onclick="app.setView('database')">Database</button>
        <button class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition" onclick="app.setView('stats')">Stats</button>
        <button class="ml-2 flex items-center gap-1.5 bg-gradient-to-r from-pink-600 to-rose-500 hover:from-pink-500 hover:to-rose-400 text-white text-xs font-bold px-3 py-1.5 rounded-full transition shadow-lg shadow-pink-900/30" onclick="app.openTipJar()">
          <span class="material-symbols-outlined" style="font-size:14px;line-height:1">volunteer_activism</span> TIP JAR
        </button>
      </div>
      <button class="md:hidden p-2 text-slate-400 hover:text-white" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>
  <div class="hidden md:hidden bg-slate-800 border-t border-slate-700" id="mobile-menu">
    <div class="flex flex-col p-2 space-y-1">
      <button class="px-3 py-2 text-left rounded-md hover:bg-white/10" onclick="app.setView('home'); document.getElementById('mobile-menu').classList.add('hidden')">Home</button>
      <button class="px-3 py-2 text-left rounded-md hover:bg-white/10" onclick="app.startRandomGame(); document.getElementById('mobile-menu').classList.add('hidden')">Play</button>
      <button class="px-3 py-2 text-left rounded-md hover:bg-white/10" onclick="app.setView('database'); document.getElementById('mobile-menu').classList.add('hidden')">Database</button>
      <button class="px-3 py-2 text-left rounded-md hover:bg-white/10" onclick="app.setView('stats'); document.getElementById('mobile-menu').classList.add('hidden')">Stats</button>
      <button class="flex items-center gap-2 px-3 py-2 text-left rounded-md bg-gradient-to-r from-pink-900/40 to-rose-900/40 hover:from-pink-900/60 text-pink-300 font-bold" onclick="app.openTipJar(); document.getElementById('mobile-menu').classList.add('hidden')">
        <span class="material-symbols-outlined text-sm">volunteer_activism</span> KindaCharming's Tip Jar
      </button>
    </div>
  </div>
</nav>

<!-- Main App Container -->
<main class="flex-grow container mx-auto px-4 py-8" id="app-container">
  <div class="flex items-center justify-center py-20">
    <div class="text-center text-slate-400">
      <div class="w-8 h-8 border-2 border-blue-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      Loading archive...
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="border-t border-white/10 bg-slate-900 mt-auto pb-safe">
  <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center text-slate-400 text-sm gap-4">
    <p>Fan-made archive. Not affiliated with Netflix or Best Guess Live.</p>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-slate-500" id="status-indicator"></span>
        <span id="data-source-status">Loading...</span>
      </div>
      <!-- Subtle admin button -->
      <button class="opacity-10 hover:opacity-100 transition-opacity p-2 text-slate-500 hover:text-white" onclick="app.setView('admin')" title="Admin">
        <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
      </button>
    </div>
  </div>
</footer>

<!-- ==================== TEMPLATES ==================== -->

<!-- HOME -->
<template id="view-home">
<div class="flex flex-col items-center justify-center space-y-12 fade-in py-10">
  <div class="text-center space-y-6 max-w-3xl">
    <div class="relative inline-block group cursor-pointer" onclick="app.startRandomGame()">
      <div class="absolute -inset-1 bg-gradient-to-r from-yellow-400 to-blue-600 rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
      <img src="bestguessarchive.png" alt="Best Guess Logo" class="relative w-48 h-48 mx-auto rounded-full border-4 border-slate-800 shadow-2xl hover:scale-105 transition transform duration-300 object-cover">
    </div>
    <h1 class="text-5xl md:text-7xl font-display font-bold tracking-tight">
      <span class="text-white">THE COMPLETE</span><br>
      <span class="gold-gradient-text">ARCHIVE</span>
    </h1>
    <p class="text-slate-300 text-lg md:text-xl max-w-2xl mx-auto">
      Relive the intensity. Search every clue, analyze the data, or play a simulation of random old episodes against the clock.
    </p>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
      <div class="glass-panel p-6 rounded-xl text-center">
        <div class="text-sm text-slate-400 uppercase tracking-widest mb-1">Total Prize Money</div>
        <div class="text-3xl font-bold text-green-400 font-display" id="total-money-display">...</div>
      </div>
      <div class="glass-panel p-6 rounded-xl text-center">
        <div class="text-sm text-slate-400 uppercase tracking-widest mb-1">Games Archived</div>
        <div class="text-3xl font-bold text-blue-400 font-display" id="total-games-display">...</div>
      </div>
      <div class="glass-panel p-6 rounded-xl text-center">
        <div class="text-sm text-slate-400 uppercase tracking-widest mb-1">Total Winners</div>
        <div class="text-3xl font-bold text-yellow-400 font-display" id="total-winners-display">...</div>
      </div>
    </div>
    <div class="flex flex-col gap-4 justify-center mt-10">
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <button class="btn-primary px-8 py-4 rounded-lg font-bold text-lg flex items-center justify-center gap-2 group" onclick="app.startRandomGame()">
          <span class="material-symbols-outlined group-hover:rotate-12 transition">play_circle</span>
          PLAY RANDOM GAME
        </button>
        <button class="glass-panel px-8 py-4 rounded-lg font-bold text-lg hover:bg-white/10 transition flex items-center justify-center gap-2" onclick="app.setView('database')">
          <span class="material-symbols-outlined">database</span>
          BROWSE DATABASE
        </button>
      </div>
      <!-- Timer Select -->
      <div class="flex items-center justify-center gap-3 text-sm text-slate-400 mt-2 fade-in">
        <span class="material-symbols-outlined text-[#FFA300] text-[18px]">timer</span>
        <label for="clue-duration-select">Clue Display Time:</label>
        <select id="clue-duration-select" class="bg-slate-800 border border-slate-600 focus:border-blue-500 text-white rounded px-2 py-1 outline-none transition" onchange="localStorage.setItem('clue_time', this.value)">
          <option value="20">20 Seconds (Real Game)</option>
          <option value="30">30 Seconds</option>
          <option value="45">45 Seconds</option>
          <option value="60">60 Seconds</option>
        </select>
      </div>
    </div>

    <!-- Tip Jar -->
    <div class="mt-10 w-full max-w-md mx-auto">
      <div class="relative rounded-2xl overflow-hidden border border-pink-500/30 shadow-xl shadow-pink-950/40 bg-gradient-to-br from-slate-800 via-slate-800 to-pink-950/40">
        <div class="absolute inset-0 bg-gradient-to-br from-pink-500/5 to-rose-500/5 pointer-events-none"></div>
        <div class="relative p-6 text-center space-y-3">
          <div class="flex items-center justify-center gap-2 mb-1">
            <span class="material-symbols-outlined text-pink-400 text-3xl">volunteer_activism</span>
          </div>
          <h3 class="font-display text-2xl font-bold tracking-wide text-white">KindaCharming's <span class="text-pink-400">Tip Jar</span></h3>
          <p class="text-slate-400 text-sm">Love the archive? Help keep it running! Every tip is appreciated. 💖</p>
          <div class="flex flex-col sm:flex-row gap-3 justify-center mt-4">
            <a id="tip-cashapp" href="#" target="_blank" rel="noopener noreferrer"
              class="flex items-center justify-center gap-2 bg-[#00D64F] hover:bg-[#00c047] text-black font-bold px-6 py-3 rounded-xl transition shadow-lg shadow-green-900/30 text-sm">
              <svg width="18" height="18" viewBox="0 0 48 48" fill="currentColor"><path d="M36.3 7.1L40.9 11.7C41.7 12.5 41.7 13.8 40.9 14.6L38.3 17.2C39.5 20.1 39.8 23.2 39.1 26.3L42.9 30.1C43.7 30.9 43.7 32.2 42.9 33L38.3 37.6C37.5 38.4 36.2 38.4 35.4 37.6L31.6 33.8C28.5 34.5 25.4 34.2 22.5 33L19.9 35.6C19.1 36.4 17.8 36.4 17 35.6L12.4 31C11.6 30.2 11.6 28.9 12.4 28.1L15 25.5C13.8 22.6 13.5 19.5 14.2 16.4L10.4 12.6C9.6 11.8 9.6 10.5 10.4 9.7L15 5.1C15.8 4.3 17.1 4.3 17.9 5.1L21.7 8.9C24.8 8.2 27.9 8.5 30.8 9.7L33.4 7.1C34.2 6.3 35.5 6.3 36.3 7.1ZM24 16C19.6 16 16 19.6 16 24C16 28.4 19.6 32 24 32C28.4 32 32 28.4 32 24C32 19.6 28.4 16 24 16Z"/></svg>
              Cash App
            </a>
            <a id="tip-paypal" href="#" target="_blank" rel="noopener noreferrer"
              class="flex items-center justify-center gap-2 bg-[#003087] hover:bg-[#002070] text-white font-bold px-6 py-3 rounded-xl transition shadow-lg shadow-blue-900/30 text-sm">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.59 3.025-2.566 4.643-5.813 4.643H12.55c-.526 0-.974.382-1.056.9l-1.188 7.528-.339 2.158a.67.67 0 0 0 .663.776h3.498c.459 0 .85-.334.922-.787l.038-.196.731-4.63.047-.256a.932.932 0 0 1 .921-.788h.58c3.76 0 6.701-1.528 7.559-5.946.36-1.847.174-3.388-.685-4.115z"/></svg>
              PayPal
            </a>
          </div>
          <p class="text-[11px] text-slate-600 mt-2">Links open in a new tab · All tips go directly to the creator</p>
        </div>
      </div>
    </div>

  </div>
</div>
</template>

<!-- PLAY -->
<template id="view-play">
<!-- Game layout — fills viewport, no page scroll during play -->
<div id="play-game-layout" class="flex flex-col">
  <!-- Header bar -->
  <div class="flex-shrink-0 flex items-center justify-between gap-3 px-4 py-2 border-b border-white/10 bg-slate-900/70 backdrop-blur-sm">
    <button class="text-slate-400 hover:text-white flex items-center gap-1 text-xs font-bold transition shrink-0" onclick="app.exitGame()">
      <span class="material-symbols-outlined" style="font-size:18px;line-height:1">close</span> QUIT
    </button>
    <div class="text-center min-w-0 flex-grow">
      <div class="text-white font-semibold text-xs md:text-sm truncate" id="game-date">Loading...</div>
      <div class="text-[10px] text-slate-500" id="play-rules-hint">One guess only.</div>
    </div>
    <div class="text-right shrink-0">
      <div class="text-[9px] text-green-500 uppercase tracking-widest" id="pot-label">Pot</div>
      <div class="text-green-400 font-mono font-bold text-sm leading-tight" id="game-pot">$0</div>
    </div>
  </div>

  <!-- Past clues — compact, always visible, scrollable if somehow they overflow -->
  <div class="flex-shrink-0 px-3 pt-2 pb-1 space-y-1.5 overflow-y-auto" style="max-height:35%" id="past-clues"></div>

  <!-- Active clue — takes all remaining height, vertically centered -->
  <div class="flex-grow flex items-center justify-center px-3 py-2 min-h-0" id="active-clue-area">
    <div class="text-slate-500 text-sm">Preparing...</div>
  </div>

  <!-- Input bar — always at bottom, part of normal flow (not fixed) -->
  <div class="flex-shrink-0 border-t border-white/10 bg-slate-900/80 backdrop-blur-md px-3 pt-3 pb-4" id="input-container" style="padding-bottom: max(1rem, env(safe-area-inset-bottom))">
    <div class="relative mb-2">
      <input autocomplete="off" id="guess-input" type="text"
        class="w-full bg-slate-800 border border-slate-600 rounded-lg py-3 pl-4 pr-28 text-base text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
        placeholder="Your best guess..."
        onkeydown="if(event.key==='Enter') app.submitGuess()">
      <button class="absolute right-2 top-1.5 bottom-1.5 bg-green-600 hover:bg-green-500 text-white font-bold px-4 rounded text-sm transition flex items-center gap-1" onclick="app.submitGuess()">
        <span class="material-symbols-outlined" style="font-size:16px;line-height:1">check</span> LOCK IN
      </button>
    </div>
    <div class="flex justify-end">
      <button class="text-slate-400 hover:text-white flex items-center gap-1 text-xs transition" onclick="app.nextClue()">
        SKIP CLUE <span class="material-symbols-outlined" style="font-size:14px;line-height:1">skip_next</span>
      </button>
    </div>
  </div>
</div>

<!-- Result screen — shown after game ends, normal scrollable page layout -->
<div class="hidden max-w-xl mx-auto text-center space-y-6 py-10 px-4 pb-20 fade-in" id="game-state-result">
  <div class="material-symbols-outlined text-8xl mb-4 animate-bounce" id="result-icon">emoji_events</div>
  <h2 class="text-5xl font-display font-bold" id="result-title"></h2>
  <p class="text-xl text-slate-300 max-w-lg mx-auto" id="result-message"></p>
  <div class="glass-panel p-6 rounded-xl border border-white/10 shadow-2xl">
    <div class="text-xs text-slate-400 uppercase tracking-widest mb-2">The Secret Answer</div>
    <div class="text-4xl font-bold font-display text-blue-400 tracking-wide mb-6" id="result-answer">ANSWER</div>
    <div class="bg-slate-900/50 rounded-lg p-4 text-left text-sm space-y-3" id="result-stats-table"></div>
  </div>
  <div class="glass-panel p-6 rounded-xl text-left text-sm text-slate-300 space-y-4">
    <h3 class="font-bold text-white border-b border-white/10 pb-2 flex items-center gap-2">
      <span class="material-symbols-outlined text-yellow-500 text-sm">lightbulb</span>
      Host's Explanation
    </h3>
    <p class="italic text-lg text-slate-200 leading-relaxed" id="result-explanation">...</p>
    <div class="mt-4 pt-4 border-t border-white/5">
      <span class="text-xs text-slate-500 uppercase tracking-widest block mb-1">Host</span>
      <span class="text-white font-medium" id="result-host">Loading...</span>
    </div>
  </div>
  <button class="btn-primary px-8 py-4 rounded-lg font-bold text-lg shadow-lg hover:shadow-blue-500/20" onclick="app.startRandomGame()">
    Play Another Round
  </button>
</div>
</template>

<!-- DATABASE -->
<template id="view-database">
<div class="space-y-6 fade-in pb-20">
  <div class="flex flex-col md:flex-row justify-between items-center gap-4">
    <h2 class="text-3xl font-display font-bold">Game <span class="text-blue-500">Archive</span></h2>
    <div class="relative w-full md:w-96">
      <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">search</span>
      <input id="db-search" type="text" onkeyup="app.filterDatabase()"
        class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500"
        placeholder="Search item, date, or host...">
    </div>
  </div>
  <div class="glass-panel rounded-xl overflow-hidden shadow-xl border border-slate-700">
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-300">
        <thead class="bg-slate-900/80 text-xs uppercase font-medium text-slate-400 sticky top-0">
          <tr>
            <th class="px-6 py-4 cursor-pointer hover:text-white" onclick="app.sortDatabase('date')">Date ↕</th>
            <th class="px-6 py-4">Secret Item</th>
            <th class="px-6 py-4 cursor-pointer hover:text-white" onclick="app.sortDatabase('pot')">Pot ↕</th>
            <th class="px-6 py-4 text-center">Format</th>
            <th class="px-6 py-4 text-center">Medal Clues</th>
            <th class="px-6 py-4 text-center">Winners</th>
            <th class="px-6 py-4">Host</th>
            <th class="px-6 py-4 text-right">Details</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-700/50" id="db-table-body"></tbody>
      </table>
    </div>
    <div class="bg-slate-900/50 px-6 py-3 text-xs text-slate-500 flex justify-between items-center">
      <span id="db-count-display">Loading database...</span>
    </div>
  </div>
</div>
</template>

<!-- STATS -->
<template id="view-stats">
<div class="fade-in space-y-8 pb-20">
  <h2 class="text-3xl font-display font-bold mb-6">Archive <span class="text-yellow-500">Statistics</span></h2>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="glass-panel p-6 rounded-xl border-t-4 border-red-500">
      <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-red-500">dangerous</span> Hardest Games
      </h3>
      <p class="text-xs text-slate-400 mb-4">Games where winners weren't crowned until the latest clues.</p>
      <ul class="space-y-3" id="stats-hardest-list"></ul>
    </div>
    <div class="glass-panel p-6 rounded-xl border-t-4 border-green-500">
      <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-green-500">check_circle</span> Most Winners
      </h3>
      <p class="text-xs text-slate-400 mb-4">Games with the highest total number of correct guesses.</p>
      <ul class="space-y-3" id="stats-easiest-list"></ul>
    </div>
    <div class="glass-panel p-8 rounded-xl md:col-span-2">
      <h3 class="text-xl font-bold text-white mb-6 border-b border-white/10 pb-2">Breakdown</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="text-center p-4 bg-slate-800/50 rounded-lg">
          <div class="text-4xl font-bold text-blue-400 mb-1" id="stat-hunter-games">0</div>
          <div class="text-sm text-slate-400 uppercase tracking-widest">Hunter March</div>
        </div>
        <div class="text-center p-4 bg-slate-800/50 rounded-lg">
          <div class="text-4xl font-bold text-purple-400 mb-1" id="stat-howie-games">0</div>
          <div class="text-sm text-slate-400 uppercase tracking-widest">Howie Mandel</div>
        </div>
        <div class="text-center p-4 bg-slate-800/50 rounded-lg">
          <div class="text-4xl font-bold text-yellow-400 mb-1" id="stat-v2-games">0</div>
          <div class="text-sm text-slate-400 uppercase tracking-widest">New Format (v2)</div>
        </div>
      </div>
    </div>
  </div>
</div>
</template>

<!-- ADMIN -->
<template id="view-admin">
<div class="max-w-2xl mx-auto fade-in py-10 space-y-6">
  <h2 class="text-3xl font-display font-bold">Admin <span class="text-yellow-500">Panel</span></h2>

  <!-- PIN Gate -->
  <div id="admin-pin-gate" class="glass-panel p-8 rounded-xl space-y-4">
    <p class="text-slate-400 text-sm">Enter admin PIN to continue.</p>
    <input id="admin-pin-input" type="password" maxlength="8"
      class="w-full bg-slate-800 border border-slate-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-yellow-500"

<script>
// ============================================================
// ADMIN PIN
// SHA-256 of the PIN. Default PIN is "1234".
// To change: open browser console and run:
//   crypto.subtle.digest('SHA-256',new TextEncoder().encode('YOURPIN'))
//     .then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
// Then update ADMIN_PIN_HASH below and commit.
const ADMIN_PIN_HASH = '9071cdd9b1455951925e4a5ebbcb248fecc6e9028feac5bfd7f38d9bc2f1bf37'; // SHA-256("132025")

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ============================================================
class App {
  constructor() {
    this.games = [];
    this.currentGame = null;
    this.currentClueIndex = 0;
    this.timer = null;
    this._pendingGames = null;
    this.init();
  }

  async init() {
    try {
      const res = await fetch('./data/games.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      this.games = await res.json();
      document.getElementById('status-indicator').className = 'w-2 h-2 rounded-full bg-green-500';
      document.getElementById('data-source-status').innerText = `${this.games.length} games loaded`;
    } catch (err) {
      console.error('Could not load games.json:', err);
      document.getElementById('status-indicator').className = 'w-2 h-2 rounded-full bg-red-500';
      document.getElementById('data-source-status').innerText = 'Data load failed';
    }
    this.setView('home');
  }

  // ==================== VIEWS ====================
  setView(name) {
    const tpl = document.getElementById(`view-${name}`);
    if (!tpl) return;
    const container = document.getElementById('app-container');
    container.innerHTML = tpl.innerHTML;
    // Play mode: fill the viewport with no padding so the layout is self-contained
    if (name === 'play') {
      container.style.padding = '0';
      container.style.overflow = 'hidden';
      // Size the game layout to fill remaining viewport below the nav (64px)
      const layout = document.getElementById('play-game-layout');
      if (layout) {
        layout.style.height = 'calc(100dvh - 64px)';
        layout.style.maxWidth = '48rem'; // max-w-3xl equivalent
        layout.style.margin = '0 auto';
      }
    } else {
      container.style.padding = '';
      container.style.overflow = '';
    }
    window.scrollTo(0, 0);
    if (name === 'home') {
      this.renderHomeStats(); 
      this._applyTipLinks();
      const durSel = document.getElementById('clue-duration-select');
      if (durSel) durSel.value = localStorage.getItem('clue_time') || '20';
    }
    if (name === 'database') this.renderDatabase();
    if (name === 'stats')    this.renderStats();
    if (name === 'admin')    this.initAdmin();
  }

  // ==================== HOME ====================
  renderHomeStats() {
    if (!this.games.length) return;
    const totalPot     = this.games.reduce((a, g) => a + g.pot, 0);
    const totalWinners = this.games.reduce((a, g) => a + (g.totalWinners || g.winnerCount || 0), 0);
    setTimeout(() => {
      const m = document.getElementById('total-money-display');
      const g = document.getElementById('total-games-display');
      const w = document.getElementById('total-winners-display');
      if (m) m.innerText = '$' + totalPot.toLocaleString();
      if (g) g.innerText = this.games.length;
      if (w) w.innerText = totalWinners.toLocaleString();
    }, 50);
  }

  // Default tip URLs (overridden by admin settings if saved)
  _tipDefaults() {
    return {
      cashapp: localStorage.getItem('tip_cashapp') || 'https://cash.app/$JeremyBean',
      paypal:  localStorage.getItem('tip_paypal')  || 'https://paypal.me/KindaCharming'
    };
  }

  // Apply saved tip links to the home page cards
  _applyTipLinks() {
    const { cashapp, paypal } = this._tipDefaults();
    const cashApp = cashapp;
    const pp      = paypal;
    setTimeout(() => {
      const ca = document.getElementById('tip-cashapp');
      const ppEl = document.getElementById('tip-paypal');
      if (ca) ca.href = cashApp;
      if (ppEl) ppEl.href = pp;
    }, 50);
  }

  // Tip jar modal — opens from nav button
  openTipJar() {
    const { cashapp: cashApp, paypal } = this._tipDefaults();
    document.getElementById('modal-backdrop').classList.remove('hidden');
    document.getElementById('modal-content').innerHTML = `
      <div class="text-center space-y-5">
        <div class="flex justify-center">

        </div>
        <h2 class="font-display text-3xl font-bold text-white">KindaCharming's <span class="text-pink-400">Tip Jar</span></h2>
        <p class="text-slate-400 max-w-sm mx-auto text-sm leading-relaxed">
          This archive is a fan-made labor of love — tracking every episode, every clue, every winner.
          If it brings you joy, consider leaving a tip! 💖
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center mt-2">
          <a href="${cashApp}" target="_blank" rel="noopener noreferrer"
            class="flex items-center justify-center gap-2 bg-[#00D64F] hover:bg-[#00c047] text-black font-bold px-8 py-4 rounded-xl transition shadow-lg text-base">
            <svg width="20" height="20" viewBox="0 0 48 48" fill="currentColor"><path d="M36.3 7.1L40.9 11.7C41.7 12.5 41.7 13.8 40.9 14.6L38.3 17.2C39.5 20.1 39.8 23.2 39.1 26.3L42.9 30.1C43.7 30.9 43.7 32.2 42.9 33L38.3 37.6C37.5 38.4 36.2 38.4 35.4 37.6L31.6 33.8C28.5 34.5 25.4 34.2 22.5 33L19.9 35.6C19.1 36.4 17.8 36.4 17 35.6L12.4 31C11.6 30.2 11.6 28.9 12.4 28.1L15 25.5C13.8 22.6 13.5 19.5 14.2 16.4L10.4 12.6C9.6 11.8 9.6 10.5 10.4 9.7L15 5.1C15.8 4.3 17.1 4.3 17.9 5.1L21.7 8.9C24.8 8.2 27.9 8.5 30.8 9.7L33.4 7.1C34.2 6.3 35.5 6.3 36.3 7.1ZM24 16C19.6 16 16 19.6 16 24C16 28.4 19.6 32 24 32C28.4 32 32 28.4 32 24C32 19.6 28.4 16 24 16Z"/></svg>
            Cash App
          </a>
          <a href="${paypal}" target="_blank" rel="noopener noreferrer"
            class="flex items-center justify-center gap-2 bg-[#003087] hover:bg-[#002070] text-white font-bold px-8 py-4 rounded-xl transition shadow-lg text-base">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.59 3.025-2.566 4.643-5.813 4.643H12.55c-.526 0-.974.382-1.056.9l-1.188 7.528-.339 2.158a.67.67 0 0 0 .663.776h3.498c.459 0 .85-.334.922-.787l.038-.196.731-4.63.047-.256a.932.932 0 0 1 .921-.788h.58c3.76 0 6.701-1.528 7.559-5.946.36-1.847.174-3.388-.685-4.115z"/></svg>
            PayPal
          </a>
        </div>
        <p class="text-xs text-slate-600 pt-2">Links open in a new tab · Thank you so much! 🙏</p>
      </div>`;
  }

  // ==================== PLAY ====================
  clearTimers() {
    if (this._clueTimeout) clearTimeout(this._clueTimeout);
    if (this._clueInterval) clearInterval(this._clueInterval);
    if (this._delayTimeout) clearTimeout(this._delayTimeout);
  }

  startRandomGame() {
    this.clearTimers();
    this.setView('play');
    const idx = Math.floor(Math.random() * this.games.length);
    this.currentGame = this.games[idx];
    this.currentClueIndex = 0;

    document.getElementById('game-date').innerText = this.currentGame.date;

    const potEl   = document.getElementById('game-pot');
    const labelEl = document.getElementById('pot-label');
    if (this.currentGame.format === 'v2') {
      potEl.innerHTML   = `$${this.currentGame.pot.toLocaleString()}<div class="text-[10px] text-slate-400 mt-0.5">🥇$3K · 🥈$2.5K · 🥉$2K</div>`;
      labelEl.innerText = 'Prize Pot';
    } else {
      potEl.innerText   = '$' + this.currentGame.pot.toLocaleString();
      labelEl.innerText = 'Prize Pot';
    }

    const hint = document.getElementById('play-rules-hint');
    if (hint) hint.innerText = this.currentGame.format === 'v2'
      ? 'Win gold on earliest clue · silver next · bronze third'
      : 'One guess only. Earliest correct clue takes the pot.';

    this.renderGameLoop();
  }

  exitGame() {
    this.clearTimers();
    this.setView('home');
  }

  renderGameLoop() {
    this.clearTimers();
    const g = this.currentGame;
    const ci = this.currentClueIndex;

    // Past clues — compact rows, always visible above active clue
    const pastEl = document.getElementById('past-clues');
    if (pastEl) {
      pastEl.innerHTML = '';
      for (let j = 0; j < ci; j++) {
        const div = document.createElement('div');
        div.className = 'flex items-start gap-2 bg-slate-800/50 rounded-lg px-3 py-2 border border-slate-700/40';
        div.innerHTML = `<span class="flex-shrink-0 text-[10px] font-bold text-slate-400 bg-slate-700 px-1.5 py-0.5 rounded leading-tight mt-0.5">C${j+1}</span>
          <span class="text-slate-300 text-sm leading-snug">${g.clues[j].text}</span>`;
        pastEl.appendChild(div);
      }
      pastEl.scrollTop = pastEl.scrollHeight;
    }

    const durOpt = localStorage.getItem('clue_time') || '20';
    const clueSecs = parseInt(durOpt, 10);

    // Active clue card — takes the remaining space
    const activeEl = document.getElementById('active-clue-area');
    if (!activeEl) return;

    activeEl.innerHTML = `
      <div class="w-full bg-slate-800 rounded-2xl border border-slate-700 shadow-[0_0_20px_rgba(0,0,0,0.5)] overflow-hidden clue-stack-enter relative">
        <div class="px-3 pt-4 pb-5 md:px-6 md:pt-6 md:pb-6">
          <div class="flex justify-between items-center mb-5">
            <span class="text-xs font-bold text-blue-400 bg-blue-900/30 px-3 py-1 bg-opacity-50 rounded-full border border-blue-500/30 shadow-sm tracking-wider">CLUE ${ci+1} of 5</span>
            <span class="text-xs font-bold font-mono text-slate-300 bg-slate-900/50 px-2 py-1 rounded" id="timer-text-${ci}"></span>
          </div>
          <div id="loading-state-${ci}" class="flex flex-col items-center justify-center py-10 md:py-16 gap-3">
            <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin shadow-lg"></div>
            <span class="text-blue-500 font-display tracking-widest text-sm md:text-base animate-pulse uppercase">Incoming...</span>
          </div>
          <div id="text-state-${ci}" class="hidden py-4 w-full">
            <div class="bg-gradient-to-br from-[#001D4A] via-[#003087] to-[#001D4A] border-[3px] border-[#FFA300] rounded-xl shadow-2xl px-5 py-10 md:p-12 w-full flex items-center justify-center min-h-[160px] relative overflow-hidden">
              <div class="absolute inset-0 bg-[#0047AB] opacity-30 mix-blend-screen blur-xl"></div>
              <h2 class="text-3xl md:text-5xl font-extrabold text-white font-display uppercase tracking-widest text-center relative z-10" style="text-shadow: 2px 3px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; line-height: 1.3;">
                ${g.clues[ci].text}
              </h2>
            </div>
          </div>
        </div>
        <div class="h-2 w-full bg-slate-900 absolute bottom-0 left-0">
          <div id="timer-bar-${ci}" class="h-full bg-yellow-400 w-full shadow-[0_0_10px_rgba(250,204,21,0.8)]"></div>
        </div>
      </div>`;

    this._clueTimeout = setTimeout(() => {
      const loading = document.getElementById(`loading-state-${ci}`);
      const text = document.getElementById(`text-state-${ci}`);
      if (loading) loading.classList.add('hidden');
      if (text) text.classList.remove('hidden');
      this.runClueTimer(
        clueSecs,
        document.getElementById(`timer-bar-${ci}`),
        document.getElementById(`timer-text-${ci}`)
      );
    }, 1500);
  }

  runClueTimer(seconds, barEl, textEl) {
    if (!barEl) return;
    barEl.style.transition = 'none';
    barEl.style.width = '100%';
    barEl.classList.add('timer-bar');
    barEl.offsetHeight; // force reflow
    barEl.style.transition = `width ${seconds}s linear`;
    barEl.style.width = '0%';

    let remaining = seconds;
    if (textEl) textEl.innerText = remaining + 's';
    
    this._clueInterval = setInterval(() => {
      remaining--;
      if (remaining > 0) {
        if (textEl) textEl.innerText = remaining + 's';
      } else {
        clearInterval(this._clueInterval);
        if (textEl) textEl.innerHTML = '<span class="text-[10px] text-[#FFA300] uppercase animate-pulse leading-none pt-0.5">WAITING 15s...</span>';
        barEl.style.transition = 'none';
        barEl.style.width = '0%';
        barEl.classList.remove('shadow-[0_0_10px_rgba(250,204,21,0.8)]');

        this._delayTimeout = setTimeout(() => {
          this.nextClue();
        }, 15000);
      }
    }, 1000);
  }

  nextClue() {
    this.clearTimers();
    if (this.currentClueIndex < 4) {
      this.currentClueIndex++;
      this.renderGameLoop();
    } else {
      this.endGame(false, "Time's up! You ran out of clues.");
    }
  }

  submitGuess() {
    const input = document.getElementById('guess-input').value.trim();
    if (!input) return;

    const guess  = input.toLowerCase().replace(/[^a-z0-9]/g, '');
    const answer = this.currentGame.secretItem.toLowerCase().replace(/[^a-z0-9]/g, '');

    if (guess === answer) {
      this.clearTimers();
      const n = this.currentClueIndex + 1;
      const g = this.currentGame;

      if (g.format === 'v2') {
        const { goldClue, silverClue, bronzeClue, goldWinners, silverWinners, bronzeWinners } = g;
        const lastMedalClue = bronzeClue || silverClue || goldClue;
        if (n < goldClue) {
          this.endGame(true, `You solved it before any real winners! Gold wasn't cracked until Clue ${goldClue}. You'd win the entire $3,000 gold pot solo!`, 3000, 'gold');
        } else if (n === goldClue) {
          const share = 3000 / (Number(goldWinners) + 1);
          this.endGame(true, `🥇 Gold! You matched ${Number(goldWinners).toLocaleString()} real gold winner${goldWinners != 1 ? 's' : ''} on Clue ${goldClue}. You'd be winner #${(Number(goldWinners)+1).toLocaleString()}!`, share, 'gold');
        } else if (silverClue && n === silverClue) {
          const share = 2500 / (Number(silverWinners) + 1);
          this.endGame(true, `🥈 Silver! You matched ${Number(silverWinners).toLocaleString()} silver winner${silverWinners != 1 ? 's' : ''} on Clue ${silverClue}. You'd share the $2,500 silver pot!`, share, 'silver');
        } else if (bronzeClue && n === bronzeClue) {
          const share = 2000 / (Number(bronzeWinners) + 1);
          this.endGame(true, `🥉 Bronze! You matched ${Number(bronzeWinners).toLocaleString()} bronze winner${bronzeWinners != 1 ? 's' : ''} on Clue ${bronzeClue}. You'd share the $2,000 bronze pot!`, share, 'bronze');
        } else if (n < lastMedalClue) {
          this.endGame(false, `Correct answer, wrong clue! You guessed on Clue ${n}, but medal tiers were set at Clue ${goldClue} (🥇 gold)${silverClue ? ', Clue ' + silverClue + ' (🥈 silver)' : ''}${bronzeClue ? ', Clue ' + bronzeClue + ' (🥉 bronze)' : ''}. You needed to hold your guess for a medal clue.`);
        } else {
          this.endGame(false, `You were right, but too late! All medals were awarded by Clue ${lastMedalClue}. You answered on Clue ${n}.`);
        }
      } else {
        const winningClue = g.winningClue || g.goldClue;
        const winnerCount = g.totalWinners || g.winnerCount || 0;
        if (n > winningClue) {
          this.endGame(false, `You were right! But too late — the game ended on Clue ${winningClue}.`);
        } else if (n < winningClue) {
          this.endGame(true, `You got it early! Real players didn't solve it until Clue ${winningClue}. You win the whole pot!`, g.pot);
        } else {
          const share = g.pot / (winnerCount + 1);
          this.endGame(true, `Correct! You matched the ${winnerCount.toLocaleString()} real winner${winnerCount !== 1 ? 's' : ''} on Clue ${winningClue}. You'd be winner #${(winnerCount+1).toLocaleString()}!`, share);
        }
      }
    } else {
      this.endGame(false, `"${input}" was incorrect.`);
    }
  }

    const colors = { gold: 'text-yellow-400', silver: 'text-slate-300', bronze: 'text-orange-400' };

    document.getElementById('result-title').innerText = won ? (medal ? `YOU WIN ${medal.toUpperCase()}!` : 'YOU WON!') : 'GAME OVER';

    document.getElementById('result-icon').className = won

    document.getElementById('result-message').innerHTML =

    document.getElementById('result-answer').innerText = this.currentGame.secretItem;

    const g = this.currentGame;
    const fmt = s => Number(s).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    const statsEl = document.getElementById('result-stats-table');
    if (g.format === 'v2') {

        <div class="flex justify-between border-b border-white/5 pb-2">

        </div>
        <div class="flex justify-between border-b border-white/5 pb-2">
          <span class="text-orange-400 font-bold">🥉 Bronze — Clue ${g.bronzeClue}</span>
          <span class="text-white">${Number(g.bronzeWinners).toLocaleString()} winner${g.bronzeWinners != 1 ? 's' : ''} · $${fmt(g.bronzePayout)} each</span>
        </div>

        <div class="pt-1">
          <span class="text-slate-400 block text-xs mb-1">Winner Names</span>
          <span class="text-slate-300 italic">${g.winnerNames || 'None listed'}</span>
        </div>`;
    } else {
      statsEl.innerHTML = `
        <div class="flex justify-between border-b border-white/5 pb-2">
          <span class="text-slate-400">Winning Clue</span>
          <span class="text-white font-bold">Clue ${g.winningClue || g.goldClue}</span>
        </div>
        <div class="flex justify-between border-b border-white/5 pb-2">
          <span class="text-slate-400">Actual Winners</span>
          <span class="text-white font-bold">${Number(g.totalWinners || g.winnerCount || 0).toLocaleString()}</span>
        </div>

    if (expl.includes(' - "')) expl = expl.split(' - "')[1].slice(0,-1);

  filterDatabase() { this.renderDatabase(); }

  sortDatabase(key) {
    if (!this._sortDir) this._sortDir = {};
    this._sortDir[key] = this._sortDir[key] === 'asc' ? 'desc' : 'asc';
    const dir = this._sortDir[key] === 'asc' ? 1 : -1;
    if (key === 'pot') {
      this.games.sort((a, b) => dir * (a.pot - b.pot));
    } else if (key === 'date') {
      this.games.sort((a, b) => dir * (new Date(a.date) - new Date(b.date)));
    }
    this.renderDatabase();
  }

  showDetails(date, item) {
    const g = this.games.find(x => x.date === date && x.secretItem === item);
    if (!g) return;
    document.getElementById('modal-backdrop').classList.remove('hidden');

    const cluesHtml = g.clues.map((c, i) => {
      let e = c.explanation || '';
      if (e.includes(' - "')) e = e.split(' - "')[1].slice(0,-1);
      const n = i + 1;
      const isGold   = g.format === 'v2' && n === g.goldClue;
      const isSilver = g.format === 'v2' && n === g.silverClue;
      const isBronze = g.format === 'v2' && n === g.bronzeClue;
      const badge = isGold   ? '<span class="text-xs font-bold text-yellow-400 bg-yellow-900/30 px-2 py-1 rounded">🥇 Gold Winner Clue</span>'
                  : isSilver ? '<span class="text-xs font-bold text-slate-300 bg-slate-700/50 px-2 py-1 rounded">🥈 Silver Winner Clue</span>'
                  : isBronze ? '<span class="text-xs font-bold text-orange-400 bg-orange-900/30 px-2 py-1 rounded">🥉 Bronze Winner Clue</span>'
                  : '';
      return `<div class="mb-6 pb-6 border-b border-slate-700 last:border-0">
        <div class="flex flex-wrap justify-between items-center mb-2 gap-2">
          <span class="text-xs font-bold text-blue-400 bg-blue-900/30 px-2 py-1 rounded">Clue ${n}</span>
          ${badge}
          <span class="text-xs text-slate-500 ml-auto">${c.correct} correct / ${c.guesses} guesses</span>
        </div>
        <p class="text-xl text-white font-medium mb-3">"${c.text}"</p>
        <div class="bg-slate-800 p-3 rounded-lg"><p class="text-sm text-slate-400 italic">"${e || 'No explanation recorded.'}"</p></div>
      </div>`;
    }).join('');

    const fmt2 = n => Number(n).toFixed(2);
    const medalSummary = g.format === 'v2'
      ? `<div class="flex justify-center gap-2 mt-4 flex-wrap">
          <span class="bg-yellow-900/30 text-yellow-400 border border-yellow-600/30 px-3 py-1 rounded-full text-xs font-bold">🥇 Clue ${g.goldClue} · ${Number(g.goldWinners).toLocaleString()} winners · $${fmt2(g.goldPayout)} each</span>
          <span class="bg-slate-700/30 text-slate-300 border border-slate-600/30 px-3 py-1 rounded-full text-xs font-bold">🥈 Clue ${g.silverClue} · ${Number(g.silverWinners).toLocaleString()} winners · $${fmt2(g.silverPayout)} each</span>
          <span class="bg-orange-900/30 text-orange-400 border border-orange-600/30 px-3 py-1 rounded-full text-xs font-bold">🥉 Clue ${g.bronzeClue} · ${Number(g.bronzeWinners).toLocaleString()} winners · $${fmt2(g.bronzePayout)} each</span>
        </div>`
      : `<div class="flex justify-center mt-4">
          <span class="bg-blue-900/30 text-blue-400 border border-blue-600/30 px-3 py-1 rounded-full text-sm font-bold">Won on Clue ${g.winningClue || g.goldClue} · ${(g.totalWinners||g.winnerCount||0).toLocaleString()} winners · ${g.winnerPayout}</span>
        </div>`;

    document.getElementById('modal-content').innerHTML = `
      <div class="text-center mb-8">
        <div class="text-xs text-slate-500 uppercase tracking-widest mb-2">${g.date}</div>
        <h2 class="text-4xl font-display font-bold text-white">${g.secretItem}</h2>
        <div class="flex justify-center gap-4 mt-4 flex-wrap">
          <span class="inline-flex items-center gap-1 bg-green-900/30 text-green-400 border border-green-500/30 px-3 py-1 rounded-full text-sm font-bold">$${g.pot.toLocaleString()}</span>
          <span class="inline-flex items-center gap-1 bg-purple-900/30 text-purple-400 border border-purple-500/30 px-3 py-1 rounded-full text-sm font-bold">${g.host}</span>
        </div>
        ${medalSummary}
        <div class="mt-4 text-xs text-slate-400 border-t border-slate-700 pt-3">
          <span class="font-bold text-white">Winners:</span> ${g.winnerNames || 'None listed'}
        </div>
      </div>
      <div class="bg-slate-900/50 rounded-xl p-2 mb-6 border border-white/5">${cluesHtml}</div>
      <div class="text-sm text-slate-400 bg-red-900/10 border border-red-500/20 p-4 rounded-lg">
        <span class="font-bold text-red-400 block mb-1">Common Wrong Guesses:</span> ${g.wrongGuesses || 'N/A'}
      </div>`;
  }

  // ==================== STATS ====================
  renderStats() {
    const hardest = [...this.games].sort((a,b) => {
      const ac = a.format==='v2' ? (a.bronzeClue||a.goldClue) : (a.winningClue||a.goldClue||0);
      const bc = b.format==='v2' ? (b.bronzeClue||b.goldClue) : (b.winningClue||b.goldClue||0);
      return (bc - ac) || ((a.totalWinners||a.winnerCount||0) - (b.totalWinners||b.winnerCount||0));
    }).slice(0,5);

    document.getElementById('stats-hardest-list').innerHTML = hardest.map(g => {
      const last = g.format==='v2' ? (g.bronzeClue||g.goldClue) : (g.winningClue||g.goldClue||'?');
      const w = (g.totalWinners||g.winnerCount||0);
      return `<li class="flex justify-between items-center border-b border-slate-700/50 pb-3 last:border-0">
        <div><div class="font-bold text-white">${g.secretItem}</div><div class="text-xs text-slate-500">${g.date}</div></div>
        <div class="text-right shrink-0 ml-4">
          <div class="text-red-400 font-bold text-sm bg-red-900/20 px-2 py-1 rounded">Clue ${last}</div>
          <div class="text-xs text-slate-500 mt-1">${w.toLocaleString()} winners</div>
        </div>
      </li>`;
    }).join('');

    const easiest = [...this.games].sort((a,b) => (b.totalWinners||b.winnerCount||0) - (a.totalWinners||a.winnerCount||0)).slice(0,5);
    document.getElementById('stats-easiest-list').innerHTML = easiest.map(g => {
      const w = (g.totalWinners||g.winnerCount||0);
      return `<li class="flex justify-between items-center border-b border-slate-700/50 pb-3 last:border-0">
        <div><div class="font-bold text-white">${g.secretItem}</div><div class="text-xs text-slate-500">${g.date}</div></div>
        <div class="text-right shrink-0 ml-4">
          <div class="text-green-400 font-bold text-sm bg-green-900/20 px-2 py-1 rounded">${w.toLocaleString()}</div>
          <div class="text-xs text-slate-500 mt-1">winners</div>
        </div>
      </li>`;
    }).join('');

    document.getElementById('stat-hunter-games').innerText = this.games.filter(g => g.host === 'Hunter March').length;
    document.getElementById('stat-howie-games').innerText  = this.games.filter(g => g.host === 'Howie Mandel').length;
    document.getElementById('stat-v2-games').innerText     = this.games.filter(g => g.format === 'v2').length;
  }

  previewImport() {
    const raw     = document.getElementById('import-json').value.trim();
    const preview = document.getElementById('import-preview');
    const btn     = document.getElementById('btn-publish');
    const status  = document.getElementById('import-status');
    preview.innerHTML = '';
    status.className  = 'hidden';
    this._pendingGames = null;
    btn.disabled = true;

    let parsed;
    try {
      parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) parsed = [parsed];
    } catch (e) {
      preview.classList.remove('hidden');
      preview.innerHTML = `<div class="text-red-400 text-sm bg-red-900/20 p-3 rounded">Invalid JSON: ${e.message}</div>`;
      return;
    }

    const errors = [];
    parsed.forEach((g, i) => {
      ['date','format','host','pot','secretItem','clues','goldClue','totalWinners','winnerPayout','winnerNames','wrongGuesses'].forEach(k => {
        if (g[k] === undefined || g[k] === null || g[k] === '') errors.push(`Game ${i+1}: missing "${k}"`);
      });
      if (g.clues && g.clues.length !== 5) errors.push(`Game ${i+1}: clues array must have exactly 5 items (found ${g.clues?.length})`);
      if (g.format === 'v2') {
        ['silverClue','bronzeClue','goldWinners','silverWinners','bronzeWinners','goldPayout','silverPayout','bronzePayout'].forEach(k => {
          if (g[k] === undefined || g[k] === null || g[k] === '') errors.push(`Game ${i+1} (v2 format): missing "${k}"`);
        });
      }
    });

    if (errors.length) {
      preview.classList.remove('hidden');
      preview.innerHTML = `<div class="text-red-400 text-sm bg-red-900/20 p-3 rounded space-y-1">${errors.map(e=>`<div>⚠ ${e}</div>`).join('')}</div>`;
      return;
    }

    this._pendingGames = parsed;
    preview.classList.remove('hidden');
    preview.innerHTML = parsed.map(g => `
      <div class="glass-panel p-4 rounded-lg border ${g.format==='v2'?'border-yellow-600/30':'border-slate-700'}">
        <div class="flex justify-between items-start gap-4">
          <div>
            <span class="text-[10px] ${g.format==='v2'?'text-yellow-400 bg-yellow-900/30':'text-slate-400 bg-slate-800'} px-2 py-0.5 rounded font-bold uppercase">${g.format==='v2'?'V2 FORMAT':'V1 FORMAT'} · ${g.date}</span>
            <div class="text-xl font-bold font-display text-white mt-1">${g.secretItem}</div>
            <div class="text-xs text-slate-400 mt-1 uppercase tracking-wide">Host: ${g.host||'?'} <span class="mx-2 opacity-30">|</span> Pot: $${(g.pot||0).toLocaleString()}</div>
          </div>
          <div class="text-xs text-slate-300 bg-slate-900 px-3 py-2 rounded-lg border border-slate-700 shrink-0 text-right">
            ${g.format==='v2' ? 
              `<div class="flex gap-3 font-bold">
                 <div class="flex flex-col items-center"><span class="text-[10px] text-slate-500 uppercase">1st (C${g.goldClue})</span><span class="text-yellow-500">${g.goldWinners} WIN</span></div>
                 <div class="flex flex-col items-center border-l border-slate-700 pl-3"><span class="text-[10px] text-slate-500 uppercase">2nd (C${g.silverClue})</span><span class="text-slate-300">${g.silverWinners} WIN</span></div>
                 <div class="flex flex-col items-center border-l border-slate-700 pl-3"><span class="text-[10px] text-slate-500 uppercase">3rd (C${g.bronzeClue})</span><span class="text-orange-400">${g.bronzeWinners} WIN</span></div>
               </div>` : 
              `<div class="font-bold flex flex-col items-center"><span class="text-[10px] text-slate-500 uppercase">WINNING CLUE:</span><span class="text-white text-lg">C${g.goldClue}</span></div>`}
          </div>
        </div>
        <div class="mt-3 text-[10px] text-slate-400 flex flex-col gap-1.5 divide-y divide-slate-800/50 border border-slate-800 rounded p-2 bg-slate-900/30">
          ${g.clues.map((c,i)=>`<div class="pt-1.5 first:pt-0"><b class="text-slate-300">C${i+1}:</b> ${c.text} <span class="opacity-50 mx-1">/</span> ${c.correct} correct <span class="opacity-50 mx-1">/</span> ${c.guesses} total</div>`).join('')}
        </div>
      </div>`).join('');
    btn.disabled = false;
  }

  copyGeminiPrompt(e) {
    if (e) {
      e.stopPropagation();
      e.preventDefault();
    }
    const txt = document.getElementById('gemini-prompt-text').innerText;
    navigator.clipboard.writeText(txt).then(() => {
      const btn = e.target;
      const old = btn.innerText;
      btn.innerText = 'Copied!';
      btn.classList.add('bg-green-700', 'border-green-600');
      setTimeout(() => {
        btn.innerText = old;
        btn.classList.remove('bg-green-700', 'border-green-600');
      }, 2000);
    }).catch(console.error);
  }

  async publishImport() {
    if (!this._pendingGames) return;
    const owner = localStorage.getItem('gh_owner');
    const repo  = localStorage.getItem('gh_repo');
    const pat   = localStorage.getItem('gh_pat');
    const status = document.getElementById('import-status');
    const btn    = document.getElementById('btn-publish');

    if (!owner || !repo || !pat) {
      status.className = 'text-sm font-medium px-4 py-2 rounded bg-red-900/20 text-red-400';
      status.innerText = 'Save your GitHub settings first.';
      status.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.innerText = 'Publishing...';
    status.className = 'text-sm font-medium px-4 py-2 rounded bg-blue-900/20 text-blue-400';
    status.innerText = 'Fetching current games.json from GitHub...';
    status.classList.remove('hidden');

    try {
      // 1. Get current file + SHA
      const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/games.json`, {
        headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!getRes.ok) throw new Error(`GitHub GET failed (${getRes.status}). Check your PAT and repo settings.`);
      const fileData = await getRes.json();

      // 2. Decode, deduplicate, merge
      const existing = JSON.parse(atob(fileData.content.replace(/\n/g, '')));
      const existingKeys = new Set(existing.map(g => g.date + '||' + g.secretItem));
      const newGames = this._pendingGames.filter(g => !existingKeys.has(g.date + '||' + g.secretItem));
      if (!newGames.length) throw new Error('All games in this batch already exist in the archive (duplicate check passed — nothing to add).');

      // 3. Prepend and commit
      const merged  = [...newGames, ...existing];
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2))));

      status.innerText = `Committing ${newGames.length} new game${newGames.length>1?'s':''}...`;
      const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/games.json`, {
        method: 'PUT',
        headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `Add ${newGames.length} game${newGames.length>1?'s':''}: ${newGames.map(g=>g.secretItem).join(', ')}`,
          content,
          sha: fileData.sha
        })
      });
      if (!putRes.ok) throw new Error(`GitHub commit failed (${putRes.status}): ${await putRes.text()}`);

      // 4. Update local state
      this.games = merged;
      this._pendingGames = null;
      document.getElementById('import-json').value = '';
      document.getElementById('import-preview').classList.add('hidden');
      btn.disabled = true;
      btn.innerText = 'Publish to GitHub';

      status.className = 'text-sm font-medium px-4 py-2 rounded bg-green-900/20 text-green-400';
      status.innerText = `✓ ${newGames.length} game${newGames.length>1?'s':''} published! GitHub Pages will rebuild in ~30 seconds.`;
    } catch (e) {
      status.className = 'text-sm font-medium px-4 py-2 rounded bg-red-900/20 text-red-400';
      status.innerText = `Error: ${e.message}`;
      btn.disabled = false;
      btn.innerText = 'Publish to GitHub';
    }
  }
}

const app = new App();
</script>
